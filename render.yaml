# Render Blueprint — Agentic Architectures RAG API
# Docs: https://render.com/docs/blueprint-spec
#
# First-time setup: see DEPLOY.md
# Chroma Cloud prod DB: agenticArchitecturesProd (pre-indexed, 1371 chunks)

services:
  - type: web
    name: agentic-architectures-rag
    runtime: python
    repo: https://github.com/rdebiasec/agentic_architectures_tutor
    branch: main
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CHROMA_MODE
        value: cloud
      - key: CHROMA_COLLECTION
        value: agentic_architectures
      - key: CHROMA_DATABASE
        value: agenticArchitecturesProd
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      # Secrets — set in Render Dashboard on first deploy
      - key: OPENAI_API_KEY
        sync: false
      - key: CHROMA_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
